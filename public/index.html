<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@ygorcore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:         #0e0d0a;
      --bg-glass:   rgba(14, 13, 10, 0.88);
      --text:       #ddd0b8;
      --muted:      #7a6e58;
      --accent:     #c9935a;
      --accent-dim: #3a2e20;
      --border:     #2a2418;
      --mono:       'IBM Plex Mono', monospace;
      --serif:      'Crimson Pro', serif;
      --ease:       cubic-bezier(0.4, 0, 0.2, 1);
      --t-fast:     0.2s;
      --t-med:      0.35s;
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: var(--bg); }

    /* ── CANVAS ──────────────────────────────────────────── */
    #stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── SHARED GLASS PANEL ──────────────────────────────── */
    .glass {
      background: var(--bg-glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* ── HUD LAYER ───────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    #hud > * { pointer-events: auto; }

    /* Header */
    #hud-header {
      position: absolute;
      top: 28px;
      left: 36px;
    }
    #hud-header h1 {
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    #hud-header .handle {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 5px;
      letter-spacing: 0.05em;
    }

    /* Node info panel — top right */
    #node-panel {
      position: absolute;
      top: 28px;
      right: 36px;
      min-width: 230px;
      max-width: 290px;
      border-left: 2px solid var(--accent);
      padding: 14px 18px;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity var(--t-med) var(--ease),
                  transform var(--t-med) var(--ease);
    }
    #node-panel.open {
      opacity: 1;
      transform: translateY(0);
    }
    #node-panel-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    #node-panel-name {
      font-size: 1.08rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 4px;
    }
    #node-panel-desc {
      font-size: 0.86rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.55;
    }
    #node-panel-link {
      display: none;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-dim);
      transition: color var(--t-fast), border-color var(--t-fast);
    }
    #node-panel-link:hover { color: var(--text); border-color: var(--text); }

    /* Last.fm mini-player — bottom left */
    #player {
      position: absolute;
      bottom: 28px;
      left: 36px;
      display: flex;
      align-items: center;
      gap: 0;
      border-left: 2px solid var(--accent);
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity var(--t-med) var(--ease),
                  transform var(--t-med) var(--ease);
      max-width: 280px;
    }
    #player.open { opacity: 1; transform: translateY(0); }

    #player-art {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      background: var(--border);
      object-fit: cover;
      display: block;
      transition: opacity 0.5s;
    }
    #player-art.loading { opacity: 0.3; }

    #player-info {
      padding: 10px 14px;
      min-width: 0;
    }
    #player-status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }
    #player-pulse {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 2.2s ease-in-out infinite;
    }
    #player-pulse.paused { animation: none; opacity: 0.35; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }
    #player-state {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #player-track {
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    #player-artist {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    /* Menu button — bottom right */
    #menu-btn {
      position: absolute;
      bottom: 28px;
      right: 36px;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: border-color var(--t-fast);
    }
    #menu-btn:hover { border-color: var(--accent); }
    #menu-btn span {
      display: block;
      width: 16px;
      height: 1px;
      background: var(--muted);
      transition: background var(--t-fast), transform var(--t-fast), opacity var(--t-fast);
      transform-origin: center;
    }
    #menu-btn.open span { background: var(--accent); }
    #menu-btn.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    #menu-btn.open span:nth-child(2) { opacity: 0; }
    #menu-btn.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Floating menu drawer */
    #menu-drawer {
      position: absolute;
      bottom: 76px;
      right: 36px;
      width: 300px;
      padding: 0;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.4s var(--ease), opacity var(--t-med) var(--ease);
      opacity: 0;
      pointer-events: none;
    }
    #menu-drawer.open {
      max-height: 600px;
      opacity: 1;
      pointer-events: auto;
    }
    #menu-drawer-inner {
      padding: 20px 22px 22px;
    }

    .drawer-section { margin-bottom: 24px; }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;

    .drawer-bio {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--muted);
    }
    .drawer-bio em { color: var(--text); font-style: italic; }

    .post-list { list-style: none; }
    .post-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .post-list li:first-child { padding-top: 0; }
    .post-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .post-list a {
      color: var(--text);
      text-decoration: none;

      line-height: 1.4;

      transition: color var(--t-fast);

    .post-list a:hover { color: var(--accent); }
    .post-list .post-d {

    .reading-title { font-size: 0.92rem; color: var(--text); }
    .reading-author {
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;

    .quote-body {
      font-size: 0.92rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 7px;

      font-size: 8px;

      text-transform: uppercase;

    .dim { font-size: 0.85rem; color: var(--muted); font-style: italic; }

    /* Drag hint */
    #drag-hint {
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      pointer-events: none;
      animation: nudge 3.5s ease-in-out infinite;
    }
    @keyframes nudge {
      0%, 100% { opacity: 0.3; transform: translateX(-50%) translateY(0); }
      50%       { opacity: 0.6; transform: translateX(-50%) translateY(5px); }
    }
    #drag-hint.hidden { display: none; }

    /* Mobile adjustments */
    @media (max-width: 560px) {
      #hud-header  { left: 20px; top: 20px; }
      #node-panel  { right: 16px; left: 16px; max-width: none; min-width: 0; top: 20px; }
      #player      { left: 16px; bottom: 20px; max-width: calc(100vw - 120px); }
      #menu-btn    { right: 16px; bottom: 20px; }
      #menu-drawer { right: 16px; width: calc(100vw - 32px); }
    }

<script>
'use strict';

/* ════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════ */
const LASTFM_USER    = 'ygwramorim';
const LASTFM_API_KEY = '43693facbb24d1ac893a7d33846b15cc';
const SUBSTACK_RSS   = 'https://radinhodepilha.substack.com/feed';
const LASTFM_POLL_MS = 30_000;
const PI2            = Math.PI * 2;
const DEG            = Math.PI / 180;
const FOV_FACTOR     = 0.85; // fov = min(W,H) * FOV_FACTOR

/* ════════════════════════════════════════════════════════
   ORBITAL BODY REGISTRY
   ─────────────────────────────────────────────────────
   Each entry is a complete, self-contained descriptor.
   To add a body: push one object here. No other changes needed.

   Schema:
   ┌─────────────┬──────────────────────────────────────────────────────┐
   │ id          │ unique string key                                    │
   │ label       │ text shown in canvas + panel                        │
   │ tag         │ category string shown in panel header               │
   │ desc        │ description shown in panel                          │
   │ link        │ URL (null for center node)                          │
   │ linkText    │ display text for link                               │
   │ color       │ [R, G, B] 0-255                                     │
   │ radius      │ base pixel radius (depth-scaled at render time)     │
   │ orbit       │ null = stationary center node                       │
   │  ├ a        │ semi-major axis as fraction of scale                │
   │  ├ b        │ semi-minor axis as fraction of scale                │
   │  ├ speed    │ angular velocity (radians per tick)                 │
   │  ├ phase    │ initial angle offset (radians)                      │
   │  ├ tx       │ orbit plane tilt around X axis (degrees)            │
   │  └ tz       │ orbit plane rotation around Z axis (degrees)        │
   └─────────────┴──────────────────────────────────────────────────────┘
════════════════════════════════════════════════════════ */
const BODIES = [
  {
    id: 'center',
    label: 'ygorcore',
    tag: 'centro',
    desc: 'escritor. pensador por escrito. Lisboa.',
    link: null,
    linkText: null,
    color: [201, 147, 90],
    radius: 9,
    orbit: null,
  },
  {
    id: 'radinho',
    label: 'radinho de pilha',
    tag: 'escritos',
    desc: 'newsletter de cultura, política e tempo livre.',
    link: 'https://radinhodepilha.substack.com/',
    linkText: 'radinhodepilha.substack.com',
    color: [196, 82, 42],
    radius: 6,
    orbit: { a: 0.38, b: 0.19, speed: 0.00042, phase: 0.00, tx: 72, tz: 18 },
  },
  {
    id: 'twitter',
    label: '@ygorcore',
    tag: 'pensamentos',
    desc: 'argumentos em construção. tweets às 2h da manhã.',
    link: 'https://x.com/ygorcore',
    linkText: 'x.com/ygorcore',
    color: [232, 160, 32],
    radius: 5.5,
    orbit: { a: 0.30, b: 0.17, speed: 0.00058, phase: 2.10, tx: 55, tz: -38 },
  },
  {
    id: 'github',
    label: 'github',
    tag: 'código',
    desc: 'projetos em aberto. código como prática.',
    link: 'https://github.com/ygor-amorim',
    linkText: 'github.com/ygor-amorim',
    color: [138, 125, 101],
    radius: 5,
    orbit: { a: 0.43, b: 0.13, speed: 0.00033, phase: 4.20, tx: 80, tz: 62 },
  },
  {
    id: 'syzygy',
    label: '@syzygygo',
    tag: 'segundo eixo',
    desc: 'sizigia — alinhamento dos corpos. outro ângulo.',
    link: 'https://x.com/syzygygo',
    linkText: 'x.com/syzygygo',
    color: [154, 122, 170],
    radius: 4.5,
    orbit: { a: 0.24, b: 0.23, speed: 0.00068, phase: 1.10, tx: 48, tz: 92 },
  },
  {
    id: 'lastfm',
    label: 'last.fm',
    tag: 'escuta',
    desc: 'o que os ouvidos fazem enquanto o resto pensa.',
    link: 'https://www.last.fm/user/ygwramorim',
    linkText: 'last.fm/user/ygwramorim',
    color: [140, 100, 74],
    radius: 4,
    orbit: { a: 0.20, b: 0.29, speed: 0.00047, phase: 3.50, tx: 65, tz: -72 },
  },
];

/* ════════════════════════════════════════════════════════
   3D MATH  (pure functions, no side effects)
════════════════════════════════════════════════════════ */

/** Rotate vector around X axis */
const rotX = (v, a) => ({
  x: v.x,
  y: v.y * Math.cos(a) - v.z * Math.sin(a),
  z: v.y * Math.sin(a) + v.z * Math.cos(a),
});

/** Rotate vector around Y axis */
const rotY = (v, a) => ({
  x:  v.x * Math.cos(a) + v.z * Math.sin(a),
  y:  v.y,
  z: -v.x * Math.sin(a) + v.z * Math.cos(a),
});

/** Rotate vector around Z axis */
const rotZ = (v, a) => ({
  x: v.x * Math.cos(a) - v.y * Math.sin(a),
  y: v.x * Math.sin(a) + v.y * Math.cos(a),
  z: v.z,
});

/** Apply scene rotation (X then Y) */
const applyScene = (v, rx, ry) => rotY(rotX(v, rx), ry);

/** Perspective project — returns null if behind camera */
const project = (v, fov, cx, cy) => {
  const z = v.z + fov;
  if (z < 1) return null;
  return {
    x:     cx + (v.x / z) * fov,
    y:     cy + (v.y / z) * fov,
    depth: v.z,
  };
};

/**
 * Compute a point on an orbit at angle theta.
 * Applies tilt (tz then tx) to transform the flat ellipse into 3D space.
 *
 * @param {object} o   - orbit config (a, b, tx, tz)
 * @param {number} theta - angle in radians
 * @param {number} scale - scene scale in pixels
 * @returns {{x,y,z}}
 */
const orbitPoint = (o, theta, scale) => {
  const flat = { x: scale * o.a * Math.cos(theta), y: scale * o.b * Math.sin(theta), z: 0 };
  return rotX(rotZ(flat, o.tz * DEG), o.tx * DEG);
};

/**
 * Sample N+1 points evenly around an orbit ring.
 *
 * @param {object} orbit - orbit config
 * @param {number} scale
 * @param {number} [n=96]
 * @returns {Array<{x,y,z}>}
 */
const sampleOrbitRing = (orbit, scale, n = 96) =>
  Array.from({ length: n + 1 }, (_, i) => orbitPoint(orbit, (i / n) * PI2, scale));

/* ════════════════════════════════════════════════════════
   CANVAS STATE
════════════════════════════════════════════════════════ */
const canvas = /** @type {HTMLCanvasElement} */ (document.getElementById('stage'));
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;

let W, H, cx, cy, scale, fov;

/** Cache of last projected screen positions per body id (for hit testing) */
const projCache = {};

/** Scene rotation accumulator */
let sceneRX = 0.30;
let sceneRY = 0.00;

/** Auto-rotation counter */
let autoRotY = 0;

/** Zoom (1 = default, clamped 0.4–2.8) */
let zoomLevel = 1.0;
const ZOOM_MIN = 0.4;
const ZOOM_MAX = 2.8;
const ZOOM_STEP = 0.0012; // per wheel delta unit

/** Drag state */
let isDragging = false;
let dragStart  = null;
let dragRX = 0;
let dragRY = 0;

/** Interaction state */
let hoveredId = null;
let activeId  = null;
let tick      = 0;

/** Static star canvas (rebuilt on resize) */
let starCanvas = null;

/* ════════════════════════════════════════════════════════
   RESIZE  (debounced)
════════════════════════════════════════════════════════ */
let resizeTimer = null;

function applyResize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  cx    = W / 2;
  cy    = H / 2;
  scale = Math.min(W, H) * 0.46;
  fov   = Math.min(W, H) * FOV_FACTOR;
  buildStars();
}

function onResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(applyResize, 80);
}

/* ════════════════════════════════════════════════════════
   STAR FIELD  (static canvas, regenerated on resize)
════════════════════════════════════════════════════════ */
function buildStars() {
  starCanvas        = document.createElement('canvas');
  starCanvas.width  = W * dpr;
  starCanvas.height = H * dpr;

  const sc = starCanvas.getContext('2d');
  sc.scale(dpr, dpr);

  const count = Math.floor((W * H) / 2800);
  for (let i = 0; i < count; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = Math.random() * 0.7 + 0.15;
    const a = (Math.random() * 0.28 + 0.04).toFixed(2);
    sc.beginPath();
    sc.arc(x, y, r, 0, PI2);
    sc.fillStyle = `rgba(201,147,90,${a})`;
    sc.fill();
  }
}

/* ════════════════════════════════════════════════════════
   HELICOIDAL TRAJECTORY
════════════════════════════════════════════════════════ */
function drawTrajectory(rx, ry, zScale, zFov) {
  const N         = 140;
  const length    = zScale * 2.0;
  const amplitude = zScale * 0.055;
  const freq      = 7;
  const phase     = autoRotY * 1.8;

  const pts = [];
  for (let i = 0; i < N; i++) {
    const u  = (i / (N - 1)) - 0.5;
    const sv = applyScene(
      {
        x: u * length * 1.7,
        y: u * length * 0.45 + amplitude * Math.sin(freq * u * PI2 + phase),
        z: u * length * 0.28 + amplitude * Math.cos(freq * u * PI2 + phase) * 0.6,
      },
      rx, ry
    );
    const p = project(sv, zFov, cx, cy);
    if (p) pts.push(p);
  }
  if (pts.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = 'rgba(55,65,145,0.52)';
  ctx.lineWidth   = 1.4;
  ctx.setLineDash([]);
  ctx.stroke();

  // Arrow tip
  const tip  = pts[pts.length - 1];
  const ref  = pts[pts.length - 6];
  if (tip && ref) {
    const ang = Math.atan2(tip.y - ref.y, tip.x - ref.x);
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(tip.x - 11 * Math.cos(ang - 0.45), tip.y - 11 * Math.sin(ang - 0.45));
    ctx.moveTo(tip.x, tip.y);
    ctx.lineTo(tip.x - 11 * Math.cos(ang + 0.45), tip.y - 11 * Math.sin(ang + 0.45));
    ctx.strokeStyle = 'rgba(80,95,200,0.68)';
    ctx.lineWidth   = 1.1;
    ctx.stroke();
  }
}

/* ════════════════════════════════════════════════════════
   DRAW ORBIT RING
════════════════════════════════════════════════════════ */
function drawRing(body, projectedPts) {
  if (projectedPts.length < 2) return;

  const [r, g, b]    = body.color;
  const highlighted  = body.id === hoveredId || body.id === activeId;

  ctx.beginPath();
  ctx.moveTo(projectedPts[0].x, projectedPts[0].y);
  for (let i = 1; i < projectedPts.length; i++) {
    ctx.lineTo(projectedPts[i].x, projectedPts[i].y);
  }
  ctx.closePath();
  ctx.strokeStyle = highlighted
    ? `rgba(${r},${g},${b},0.75)`
    : `rgba(${r},${g},${b},0.28)`;
  ctx.lineWidth   = highlighted ? 1.3 : 0.7;
  ctx.setLineDash(highlighted ? [] : [3, 6]);
  ctx.stroke();
  ctx.setLineDash([]);
}

/* ════════════════════════════════════════════════════════
   DRAW BODY
════════════════════════════════════════════════════════ */
function drawBody(body, proj, zScale) {
  const { x, y, depth } = proj;
  const [r, g, b]       = body.color;
  const highlighted     = body.id === hoveredId || body.id === activeId;

  // Depth-based scale (near = larger + brighter)
  const normZ  = (depth + zScale) / (zScale * 2);
  const sf     = 0.72 + normZ * 0.56;
  const alpha  = 0.55 + normZ * 0.45;
  const radius = body.radius * sf;

  // Radial glow
  const glowRadius = radius * (highlighted ? 6.5 : 4.2);
  const grad = ctx.createRadialGradient(x, y, 0, x, y, glowRadius);
  grad.addColorStop(0,    `rgba(${r},${g},${b},${(alpha * 0.65).toFixed(2)})`);
  grad.addColorStop(0.38, `rgba(${r},${g},${b},${(alpha * 0.18).toFixed(2)})`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(x, y, glowRadius, 0, PI2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Core sphere
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, PI2);
  ctx.fillStyle = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
  ctx.fill();

  // Highlight ring
  if (highlighted) {
    ctx.beginPath();
    ctx.arc(x, y, radius + 5 * sf, 0, PI2);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.55)`;
    ctx.lineWidth   = 1;
    ctx.stroke();
  }

  // Label (fades with depth; always visible when highlighted)
  if (body.id !== 'center') {
    const labelAlpha = highlighted
      ? 0.92
      : Math.max(0, normZ - 0.12) * 0.65;

    if (labelAlpha > 0.04) {
      ctx.font      = `300 ${Math.max(8, Math.round(9 * sf))}px "IBM Plex Mono"`;
      ctx.textAlign = 'center';
      ctx.fillStyle = highlighted
        ? `rgba(224,212,184,${labelAlpha.toFixed(2)})`
        : `rgba(122,110,88,${labelAlpha.toFixed(2)})`;
      ctx.fillText(body.label, x, y + radius + 11 * sf);
    }
  }
}

/* ════════════════════════════════════════════════════════
   MAIN RENDER LOOP
════════════════════════════════════════════════════════ */
function drawFrame() {
  ctx.clearRect(0, 0, W, H);
  if (starCanvas) ctx.drawImage(starCanvas, 0, 0, W, H);

  tick++;
  autoRotY += 0.00022;

  const rx = sceneRX + dragRX;
  const ry = sceneRY + autoRotY + dragRY;
  const zScale = scale * zoomLevel;
  const zFov   = fov;

  // Trajectory behind everything
  drawTrajectory(rx, ry, zScale, zFov);

  // Collect renderables
  const renderables = [];

  // Orbit rings
  for (const body of BODIES) {
    if (!body.orbit) continue;

    const ring3D   = sampleOrbitRing(body.orbit, zScale);
    const ringProj = ring3D
      .map(v => project(applyScene(v, rx, ry), zFov, cx, cy))
      .filter(Boolean);

    const sumZ = ringProj.reduce((acc, p) => acc + p.depth, 0);
    renderables.push({
      kind:   'ring',
      body,
      pts:    ringProj,
      sortZ:  ringProj.length > 0 ? sumZ / ringProj.length : 0,
    });
  }

  // Bodies
  for (const body of BODIES) {
    const theta = body.orbit
      ? tick * body.orbit.speed + body.orbit.phase
      : 0;

    const wobble = body.orbit
      ? 1 + 0.018 * Math.sin(tick * 0.00008 + body.orbit.phase * 3)
      : 1;

    const v3 = body.orbit
      ? orbitPoint(
          { ...body.orbit, a: body.orbit.a * wobble, b: body.orbit.b * wobble },
          theta,
          zScale
        )
      : { x: 0, y: 0, z: 0 };

    const sv   = applyScene(v3, rx, ry);
    const proj = project(sv, zFov, cx, cy);
    if (!proj) continue;

    projCache[body.id] = proj;
    renderables.push({ kind: 'body', body, proj, sortZ: sv.z });
  }

  // Painter's algorithm: far → near
  renderables.sort((a, b) => a.sortZ - b.sortZ);

  for (const item of renderables) {
    if (item.kind === 'ring') drawRing(item.body, item.pts);
    else drawBody(item.body, item.proj, zScale);
  }

  requestAnimationFrame(drawFrame);
}

/* ════════════════════════════════════════════════════════
   HIT DETECTION
════════════════════════════════════════════════════════ */
const HIT_RADIUS = 28; // px

function hitTest(mx, my) {
  let bestId   = null;
  let bestDist = HIT_RADIUS;

  for (const body of BODIES) {
    const p = projCache[body.id];
    if (!p) continue;
    const d = Math.hypot(mx - p.x, my - p.y);
    if (d < bestDist) { bestId = body.id; bestDist = d; }
  }
  return bestId;
}

/* ════════════════════════════════════════════════════════
   NODE INFO PANEL
════════════════════════════════════════════════════════ */
const nodePanel     = document.getElementById('node-panel');
const nodePanelTag  = document.getElementById('node-panel-tag');
const nodePanelName = document.getElementById('node-panel-name');
const nodePanelDesc = document.getElementById('node-panel-desc');
const nodePanelLink = document.getElementById('node-panel-link');

function showNodePanel(id) {
  const body = BODIES.find(b => b.id === id);
  if (!body) return;

  nodePanelTag.textContent  = body.tag;
  nodePanelName.textContent = body.label;
  nodePanelDesc.textContent = body.desc;

  if (body.link) {
    nodePanelLink.href        = body.link;
    nodePanelLink.textContent = body.linkText;
    nodePanelLink.style.display = 'inline-block';
  } else {
    nodePanelLink.style.display = 'none';
  }

  nodePanel.classList.add('open');
}

function hideNodePanel() {
  nodePanel.classList.remove('open');
}

/* ════════════════════════════════════════════════════════
   POINTER / TOUCH EVENTS
════════════════════════════════════════════════════════ */
let hoverTimer = null;

canvas.addEventListener('mousemove', e => {
  const mx  = e.clientX;
  const my  = e.clientY;
  const hit = hitTest(mx, my);

  if (hit !== hoveredId) {
    hoveredId = hit;
    canvas.style.cursor = hit ? 'pointer' : isDragging ? 'grabbing' : 'crosshair';
    clearTimeout(hoverTimer);
    if (hit && hit !== activeId) {
      showNodePanel(hit);
    } else if (!hit && !activeId) {
      hoverTimer = setTimeout(hideNodePanel, 180);
    }
  }

  if (isDragging && dragStart) {
    dragRY = (dragStart.x - e.clientX) * 0.005;
    dragRX = (dragStart.y - e.clientY) * 0.003;
  }
});

canvas.addEventListener('mousedown', e => {
  dragStart  = { x: e.clientX, y: e.clientY };
  isDragging = true;
  canvas.style.cursor = 'grabbing';
  // Hide drag hint after first interaction
  document.getElementById('drag-hint').classList.add('hidden');
});

window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  sceneRX   += dragRX;
  sceneRY   += dragRY;
  dragRX     = 0;
  dragRY     = 0;
  dragStart  = null;
  isDragging = false;
  canvas.style.cursor = hoveredId ? 'pointer' : 'crosshair';
});

canvas.addEventListener('click', e => {
  const hit = hitTest(e.clientX, e.clientY);
  if (hit) {
    activeId = activeId === hit ? null : hit;
    if (activeId) showNodePanel(activeId);
    else if (!hoveredId) hideNodePanel();
  } else {
    activeId = null;
    if (!hoveredId) hideNodePanel();
  }
});

// Scroll zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel - e.deltaY * ZOOM_STEP));
}, { passive: false });

// Pinch-to-zoom (touch)
let lastPinchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastPinchDist !== null) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel * (dist / lastPinchDist)));
    lastPinchDist = dist;
  }
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = null;
}, { passive: true });
canvas.addEventListener('touchstart', e => {
  lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  document.getElementById('drag-hint').classList.add('hidden');
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  sceneRY += (lastTouch.x - e.touches[0].clientX) * 0.005;
  sceneRX += (lastTouch.y - e.touches[0].clientY) * 0.003;
  lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

canvas.addEventListener('touchend', () => { lastTouch = null; });

/* ════════════════════════════════════════════════════════
   FLOATING MENU
════════════════════════════════════════════════════════ */
const menuBtn    = document.getElementById('menu-btn');
const menuDrawer = document.getElementById('menu-drawer');
let menuOpen     = false;

function toggleMenu() {
  menuOpen = !menuOpen;
  menuBtn.classList.toggle('open', menuOpen);
  menuBtn.setAttribute('aria-expanded', String(menuOpen));
  menuDrawer.classList.toggle('open', menuOpen);
}

menuBtn.addEventListener('click', e => { e.stopPropagation(); toggleMenu(); });

canvas.addEventListener('click', () => {
  if (menuOpen) toggleMenu();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && menuOpen) toggleMenu();
});

/* ════════════════════════════════════════════════════════
   LAST.FM MINI-PLAYER
════════════════════════════════════════════════════════ */
const playerEl     = document.getElementById('player');
const playerArt    = document.getElementById('player-art');
const playerPulse  = document.getElementById('player-pulse');
const playerState  = document.getElementById('player-state');
const playerTrack  = document.getElementById('player-track');
const playerArtist = document.getElementById('player-artist');

const PLACEHOLDER_ART = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 52 52">' +
  '<rect width="52" height="52" fill="#1c1810"/>' +
  '<circle cx="26" cy="26" r="10" fill="none" stroke="#3a2e20" stroke-width="1.5"/>' +
  '<circle cx="26" cy="26" r="3" fill="#3a2e20"/>' +
  '</svg>'
);

let lastTrackId = null;

async function pollLastFm() {
  try {
    const res  = await fetch(
      `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks` +
      `&user=${LASTFM_USER}&api_key=${LASTFM_API_KEY}&format=json&limit=1`
    );
    const data = await res.json();
    const track = data.recenttracks?.track?.[0];
    if (!track) return;

    const isPlaying = track['@attr']?.nowplaying === 'true';
    const trackId   = `${track.name}::${track.artist['#text']}`;

    // Update art only when track changes
    if (trackId !== lastTrackId) {
      lastTrackId = trackId;
      const images  = track.image ?? [];
      const artUrl  = (images[2]?.['#text'] || images[1]?.['#text'] || '').trim();

      playerArt.classList.add('loading');
      if (artUrl) {
        const img = new Image();
        img.onload  = () => { playerArt.src = artUrl; playerArt.classList.remove('loading'); };
        img.onerror = () => { playerArt.src = PLACEHOLDER_ART; playerArt.classList.remove('loading'); };
        img.src     = artUrl;
      } else {
        playerArt.src = PLACEHOLDER_ART;
        playerArt.classList.remove('loading');
      }
    }

    playerTrack.textContent  = track.name;
    playerArtist.textContent = track.artist['#text'];
    playerState.textContent  = isPlaying ? 'ouvindo agora' : 'última escuta';
    playerPulse.classList.toggle('paused', !isPlaying);
    playerEl.classList.add('open');

  } catch {
    playerState.textContent = 'silêncio';
    playerArt.src = PLACEHOLDER_ART;
    playerArt.classList.remove('loading');
    playerEl.classList.add('open');
  }
}

/* ════════════════════════════════════════════════════════
   DRAWER CONTENT LOADERS
════════════════════════════════════════════════════════ */
async function loadPosts() {
  const el = document.getElementById('drawer-posts');
  try {
    const res  = await fetch(
      `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(SUBSTACK_RSS)}`
    );
    const data = await res.json();
    if (data.status !== 'ok' || !data.items?.length) throw new Error('no items');

    el.innerHTML = data.items.slice(0, 4).map(post => {
      const date = new Date(post.pubDate).toLocaleDateString('pt-BR', {
        year: 'numeric', month: 'short', day: 'numeric',
      });
      return `
        <li>
          <a href="${post.link}" target="_blank" rel="noopener noreferrer">${post.title}</a>
          <div class="post-d">${date}</div>
        </li>`;
    }).join('');
  } catch {
    el.innerHTML = '<li><span class="dim">nenhum escrito disponível</span></li>';
  }
}

async function loadReading() {
  const el = document.getElementById('drawer-reading');
  try {
    const res  = await fetch('currently-reading.json');
    const book = await res.json();
    el.innerHTML = book?.title
      ? `<div class="reading-title">${book.title}</div>
         <div class="reading-author">${book.author}</div>`
      : '<span class="dim">nenhum livro no momento</span>';
  } catch {
    el.innerHTML = '<span class="dim">nenhum livro no momento</span>';
  }
}

async function loadQuote() {
  const el = document.getElementById('drawer-quote');
  try {
    const res    = await fetch('quotes.json');
    const quotes = await res.json();
    if (!Array.isArray(quotes) || quotes.length === 0) throw new Error('empty');
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    el.innerHTML =
      `<div class="quote-body">"${q.content}"</div>
       <div class="quote-attr">— ${q.author}</div>`;
  } catch {
    el.innerHTML = '<span class="dim">—</span>';
  }
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
window.addEventListener('resize', onResize);

applyResize();
drawFrame();

// Stagger async loads to avoid burst
pollLastFm();
setInterval(pollLastFm, LASTFM_POLL_MS);

setTimeout(loadPosts,   100);
setTimeout(loadReading, 200);
setTimeout(loadQuote,   300);
</script>
</body>
